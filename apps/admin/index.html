<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Zen House — Matcha Café & Wellness</title>
    <meta name="description" content="Zen House - Premium matcha drinks, pastries and wellness classes" />
    <meta name="author" content="Zen House" />

    <meta property="og:title" content="Zen House — Matcha Café & Wellness" />
    <meta property="og:description" content="Premium matcha drinks, pastries and wellness classes" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/zenhouse-og.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ZenHouse" />
    <meta name="twitter:image" content="/images/zenhouse-og.png" />

    <!-- Preload LCP resources -->
    <!-- Fallback logo is the LCP element; preload it so the browser fetches it
         immediately instead of waiting for JS → API → render cycle. -->
    <link rel="preload" href="/images/zh-logo.png" as="image" fetchpriority="high" />
    <!-- Google Fonts: preconnect first, then load all fonts in one request.
         Using <link rel="stylesheet"> here (not @import in CSS) avoids a
         render-blocking cascade and loads fonts in parallel with the JS bundle. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:wght@400;500;600;700&family=Italianno&display=swap" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
